<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UOB Outstanding Payment</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
text-align:center;
}

.outstanding{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
font-size:16px;
box-sizing:border-box;
}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{
-webkit-appearance:none;
margin:0;
}

input[type=number]{
-moz-appearance:textfield;
}

button{
border:none;
cursor:pointer;
border-radius:5px;
font-size:12px;
padding:6px 12px;
color:white;
margin:5px 3px;
}

.make-payment-btn{
background:#d71920;
}

.make-payment-btn:hover{
background:#a81418;
}

.delete-btn{
background:#d71920;
}

.undo-btn{
background:#f39c12;
}

.reset-btn{
background:#555;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
table-layout:fixed;
}

table,th,td{
border:1px solid #ddd;
}

th,td{
padding:8px;
text-align:center;
word-wrap:break-word;
}

th{
background:#f2f2f2;
}

.deleted-text{
color:#888;
font-style:italic;
text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h2>UOB Outstanding Payment</h2>

<div class="outstanding">
Outstanding:
RM <span id="balance">3150.00</span>
</div>

<input
type="number"
id="paymentAmount"
placeholder="Enter Payment Amount"
step="0.01"
>

<button
class="make-payment-btn"
onclick="makePayment()"
>
Make Payment
</button>

<button
class="reset-btn"
onclick="resetAll()"
>
Reset
</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Payment (RM)</th>
<th>Outstanding After Payment</th>
<th>Action</th>
</tr>
</thead>

<tbody id="historyTable">
</tbody>
</table>

</div>



<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
setDoc
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey:"YOUR_API_KEY",

authDomain:
"YOUR_PROJECT.firebaseapp.com",

projectId:
"YOUR_PROJECT_ID",

storageBucket:
"YOUR_PROJECT.appspot.com",

messagingSenderId:
"YOUR_ID",

appId:
"YOUR_APP_ID"

};



const app=
initializeApp(firebaseConfig);

const db=
getFirestore(app);

const APP_DOC=
doc(
db,
"uob_app",
"main_data"
);



const DAILY_INTEREST=1.56;
const ORIGINAL_OUTSTANDING=3150.00;

let outstanding=
ORIGINAL_OUTSTANDING;

let lastInterestDate=null;

let history=[];



function renderHistory(){

const table=
document.getElementById(
"historyTable"
);

table.innerHTML="";


for(
let i=history.length-1;
i>=0;
i--
){

let item=history[i];

let row=
table.insertRow();


if(item.deleted){

let msg=row.insertCell(0);

msg.colSpan=3;

msg.innerText=
"The payment is deleted";

msg.className=
"deleted-text";


let action=
row.insertCell(1);


let undo=
document.createElement(
"button"
);

undo.innerText=
"Undo";

undo.className=
"undo-btn";

undo.onclick=
function(){
undoDelete(i);
};

action.appendChild(
undo
);

}

else{

row.insertCell(0)
.innerText=item.date;

row.insertCell(1)
.innerText=
item.payment.toFixed(2);

row.insertCell(2)
.innerText=
item.outstanding.toFixed(2);


let action=
row.insertCell(3);

let del=
document.createElement(
"button"
);

del.innerText=
"Delete";

del.className=
"delete-btn";

del.onclick=
function(){
tempDelete(i);
};

action.appendChild(
del
);

}

}

document.getElementById(
"balance"
).innerText=
outstanding.toFixed(2);

}



/* SAVE TO FIREBASE */
async function saveData(){

await setDoc(
APP_DOC,
{
outstanding:
outstanding,

lastInterestDate:
lastInterestDate
?
lastInterestDate
.toISOString()
:
null,

history:
history
}
);

}



/* LOAD */
async function loadData(){

const snap=
await getDoc(
APP_DOC
);

if(
snap.exists()
){

let data=
snap.data();

outstanding=
data.outstanding
??
ORIGINAL_OUTSTANDING;

lastInterestDate=
data.lastInterestDate
?
new Date(
data.lastInterestDate
)
:
null;

history=
data.history
||
[];

}

renderHistory();

}



/* INTEREST */
function applyInterest(){

const today=
new Date();

if(
!lastInterestDate
){
lastInterestDate=
today;
return;
}

const diffDays=
Math.floor(
(today-
new Date(
lastInterestDate
))
/
(1000*60*60*24)
);

if(
diffDays>0
){

outstanding+=
diffDays*
DAILY_INTEREST;

outstanding=
parseFloat(
outstanding.toFixed(2)
);

lastInterestDate=
today;

renderHistory();

saveData();

}

}



/* DELETE PAYMENT */
window.tempDelete=
async function(index){

let payment=
history[index]
.payment;

history[index]
.deleted=true;


/* reverse payment */
outstanding+=
payment;

outstanding=
parseFloat(
outstanding.toFixed(2)
);

renderHistory();

await saveData();

};



/* UNDO */
window.undoDelete=
async function(index){

let payment=
history[index]
.payment;

history[index]
.deleted=false;


/* reapply payment */
outstanding-=
payment;

outstanding=
parseFloat(
outstanding.toFixed(2)
);

renderHistory();

await saveData();

};



/* MAKE PAYMENT */
window.makePayment=
async function(){

applyInterest();

let payment=
parseFloat(
document
.getElementById(
"paymentAmount"
).value
);

if(
isNaN(payment)
||
payment<=0
){
alert(
"Enter valid payment."
);
return;
}


if(
payment>outstanding
){
payment=
outstanding;
}

outstanding-=
payment;

outstanding=
parseFloat(
outstanding.toFixed(2)
);

const today=
new Date()
.toLocaleDateString(
navigator.language
);


history.push({

date:today,

payment:payment,

outstanding:
outstanding,

deleted:false

});


renderHistory();

await saveData();

document
.getElementById(
"paymentAmount"
).value="";


if(
outstanding===0
){
alert(
"🎉 Fully Settled!"
);
}

};



/* RESET */
window.resetAll=
async function(){

if(
!confirm(
"Reset all data?"
)
) return;

outstanding=
ORIGINAL_OUTSTANDING;

lastInterestDate=
null;

history=[];

renderHistory();

await saveData();

};



await loadData();

applyInterest();

</script>

</body>
</html>
