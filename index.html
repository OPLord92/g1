<!DOCTYPE html>
<html>
<head>
    <title>UOB Outstanding Payment</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; padding: 30px; }
        .container { max-width: 600px; margin:auto; background:white; padding:20px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
        h2{text-align:center;}
        .outstanding { font-size:22px; font-weight:bold; margin-bottom:15px; }
        input { width:100%; padding:8px; margin-bottom:10px; font-size:16px; box-sizing: border-box; }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        button {
            border:none;
            cursor:pointer;
            border-radius:5px;
            margin-top:5px;
            font-size:12px;
            padding:5px 10px;
            color:white;
        }

        .make-payment-btn { background-color:#d71920; }
        .make-payment-btn:hover { background-color:#a81418; }

        .delete-btn { background-color:#d71920; }
        .delete-btn:hover { background-color:#a81418; }

        .reset-btn { background-color:#555; margin-top:10px; }
        .reset-btn:hover { background-color:#333; }

        table { width:100%; margin-top:20px; border-collapse:collapse; table-layout: fixed; }
        table, th, td { border:1px solid #ddd; }
        th, td { padding:8px; text-align:center; word-wrap:break-word; }
        th { background-color:#f2f2f2; }
    </style>

    <!-- 🔥 Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

<div class="container">
    <h2>UOB Outstanding Payment</h2>

    <div class="outstanding">
        Outstanding: RM <span id="balance">3150.00</span>
    </div>

    <input type="number" id="paymentAmount" placeholder="Enter Payment Amount" step="0.01">
    <button class="make-payment-btn" onclick="makePayment()">Make Payment</button>
    <button class="reset-btn" onclick="resetAll()">Reset</button>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Payment (RM)</th>
                <th>Outstanding After Payment (RM)</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="historyTable"></tbody>
    </table>
</div>

<script>
// 🔥 REPLACE THIS WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT_ID",
};

// Init Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== YOUR LOGIC =====
const DAILY_INTEREST = 1.56;
const ORIGINAL_OUTSTANDING = 3150.00;

let outstanding = ORIGINAL_OUTSTANDING;
let lastInterestDate = null;

// LOAD FROM FIREBASE
function loadData() {
    db.ref("uobData").once("value", snapshot => {
        const data = snapshot.val();
        if (!data) return;

        outstanding = data.outstanding;
        lastInterestDate = data.lastInterestDate ? new Date(data.lastInterestDate) : null;

        document.getElementById("balance").innerText = outstanding.toFixed(2);
        document.getElementById("historyTable").innerHTML = "";

        data.history.forEach(item => {
            addRow(item.date, item.payment, item.outstanding, false);
        });
    });
}

// SAVE TO FIREBASE
function saveData() {
    const table = document.getElementById("historyTable");
    const history = [];

    for (let i = 0; i < table.rows.length; i++) {
        const r = table.rows[i];
        if (r.dataset.tempDeleted === "true") continue;

        history.push({
            date: r.dataset.date,
            payment: parseFloat(r.dataset.payment),
            outstanding: parseFloat(r.dataset.outstanding)
        });
    }

    db.ref("uobData").set({
        outstanding: outstanding,
        lastInterestDate: lastInterestDate,
        history: history
    });
}

// INTEREST
function applyInterest() {
    const today = new Date();
    if (!lastInterestDate) lastInterestDate = today;

    const diffDays = Math.floor((today - new Date(lastInterestDate)) / (1000*60*60*24));

    if (diffDays > 0) {
        outstanding += diffDays * DAILY_INTEREST;
        outstanding = parseFloat(outstanding.toFixed(2));
        document.getElementById("balance").innerText = outstanding.toFixed(2);
        lastInterestDate = today;
        saveData();
    }
}

// ADD ROW
function addRow(date, payment, newOutstanding, save=true) {
    const table = document.getElementById("historyTable");
    let row = table.insertRow(0);

    row.dataset.date = date;
    row.dataset.payment = payment;
    row.dataset.outstanding = newOutstanding;

    row.insertCell(0).innerText = date;
    row.insertCell(1).innerText = payment.toFixed(2);
    row.insertCell(2).innerText = newOutstanding.toFixed(2);

    const actionCell = row.insertCell(3);
    const deleteBtn = document.createElement("button");
    deleteBtn.innerText = "Delete";
    deleteBtn.className = "delete-btn";
    deleteBtn.onclick = function() { deleteRow(row); };
    actionCell.appendChild(deleteBtn);

    if (save) saveData();
}

// DELETE (direct remove)
function deleteRow(row) {
    row.remove();
    saveData();
}

// PAYMENT
function makePayment() {
    applyInterest();

    let paymentInput = document.getElementById("paymentAmount");
    let payment = parseFloat(paymentInput.value);

    if (isNaN(payment) || payment <= 0) {
        alert("Enter valid amount");
        return;
    }

    if (payment > outstanding) payment = outstanding;

    outstanding -= payment;
    outstanding = parseFloat(outstanding.toFixed(2));

    document.getElementById("balance").innerText = outstanding.toFixed(2);

    const today = new Date().toLocaleDateString();
    addRow(today, payment, outstanding);

    paymentInput.value = "";

    if (outstanding === 0) {
        alert("🎉 Fully Settled!");
    }
}

// RESET
function resetAll() {
    if (!confirm("Reset all data?")) return;

    db.ref("uobData").remove();

    outstanding = ORIGINAL_OUTSTANDING;
    lastInterestDate = null;
    document.getElementById("balance").innerText = outstanding.toFixed(2);
    document.getElementById("historyTable").innerHTML = "";
}

// INIT
loadData();
setTimeout(applyInterest, 1000);
</script>

</body>
</html>
